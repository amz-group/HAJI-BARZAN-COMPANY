<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HajiBarzan Company</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8960C;
    --gold-light: #F0B429;
    --gold-pale: #FFF8E7;
    --dark: #1A1208;
    --dark2: #2D1F0A;
    --mid: #5C3D11;
    --text: #3B2507;
    --text-light: #7A5C2E;
    --white: #FFFDF7;
    --gray: #F5EFE0;
    --border: #E8D5A3;
    --danger: #C0392B;
    --success: #27AE60;
    --shadow: 0 4px 20px rgba(200,150,12,0.15);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Kufi Arabic', sans-serif;
    background: var(--white);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SPLASH SCREEN ===== */
  #splash {
    position: fixed; inset: 0;
    background: linear-gradient(145deg, var(--dark) 0%, var(--dark2) 60%, #4A2C08 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
  .splash-logo {
    width: 90px; height: 90px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 42px;
    box-shadow: 0 0 60px rgba(200,150,12,0.5);
    animation: pulse 2s infinite;
    margin-bottom: 20px;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 40px rgba(200,150,12,0.4)} 50%{box-shadow:0 0 80px rgba(200,150,12,0.7)} }
  .splash-title { color: var(--gold-light); font-size: 26px; font-weight: 900; letter-spacing: 1px; }
  .splash-sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px; }
  .splash-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 40px; overflow: hidden; }
  .splash-progress { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 10px; animation: load 1.8s ease forwards; }
  @keyframes load { from{width:0} to{width:100%} }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
    color: white; padding: 16px 18px 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 15px; font-weight: 900; color: var(--gold-light); line-height: 1.2; }
  .logo-sub { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 400; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    width: 38px; height: 38px;
    border: none; border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; position: relative;
    transition: background 0.2s;
  }
  .btn-icon:active { background: rgba(255,255,255,0.2); }
  .badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--gold); color: var(--dark);
    font-size: 9px; font-weight: 900;
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== NAV TABS ===== */
  .nav-tabs {
    display: flex; gap: 0;
    background: rgba(0,0,0,0.3);
    border-radius: 0; margin-top: 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex: 0 0 auto;
    padding: 8px 16px;
    border: none; background: none;
    color: rgba(255,255,255,0.5);
    font-family: inherit; font-size: 12px; font-weight: 600;
    cursor: pointer; border-radius: 8px;
    transition: all 0.2s; white-space: nowrap;
  }
  .nav-tab.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
  }

  /* ===== MAIN CONTENT ===== */
  .main { padding: 16px; padding-bottom: 80px; }

  /* ===== PAGES ===== */
  .page { display: none; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ===== STORE SELECTOR ===== */
  .section-title {
    font-size: 18px; font-weight: 900; color: var(--dark);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display: inline-block;
    width: 4px; height: 20px;
    background: linear-gradient(180deg, var(--gold), var(--gold-light));
    border-radius: 2px;
  }

  .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .store-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    text-align: center; cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .store-card:active { transform: scale(0.97); }
  .store-card.selected {
    border-color: var(--gold);
    background: var(--gold-pale);
    box-shadow: 0 4px 20px rgba(200,150,12,0.3);
  }
  .store-icon { font-size: 30px; margin-bottom: 8px; }
  .store-name { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .store-cat { font-size: 10px; color: var(--text-light); margin-top: 3px; }

  /* ===== PRODUCT GRID ===== */
  .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .product-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.2s;
  }
  .product-card:active { transform: scale(0.97); }
  .product-img {
    width: 100%; height: 100px;
    background: linear-gradient(135deg, var(--gray), var(--border));
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
  }
  .product-info { padding: 10px; }
  .product-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .product-price { font-size: 14px; font-weight: 900; color: var(--gold); }
  .product-unit { font-size: 10px; color: var(--text-light); }
  .product-add {
    width: 100%; padding: 8px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; border-radius: 10px;
    color: var(--dark); font-family: inherit;
    font-size: 12px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s;
  }
  .product-add:active { opacity: 0.8; }

  /* Qty control */
  .qty-control { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .qty-btn {
    width: 28px; height: 28px;
    border: 2px solid var(--gold);
    background: white; border-radius: 8px;
    font-size: 16px; font-weight: 900; color: var(--gold);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .qty-num { flex: 1; text-align: center; font-weight: 900; font-size: 14px; color: var(--text); }

  /* ===== CART PAGE ===== */
  .cart-empty {
    text-align: center; padding: 60px 20px;
    color: var(--text-light);
  }
  .cart-empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
  .cart-empty-text { font-size: 16px; font-weight: 700; }

  .cart-item {
    background: white; border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    margin-bottom: 10px; display: flex;
    align-items: center; gap: 12px;
    box-shadow: var(--shadow);
  }
  .cart-item-icon { font-size: 32px; flex-shrink: 0; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-store { font-size: 10px; color: var(--text-light); margin-bottom: 4px; }
  .cart-item-price { font-size: 13px; font-weight: 900; color: var(--gold); }
  .cart-delete {
    width: 32px; height: 32px; border-radius: 8px;
    background: #FFF0F0; border: 1.5px solid #FFCCCC;
    color: var(--danger); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }

  .cart-summary {
    background: linear-gradient(135deg, var(--dark), var(--dark2));
    border-radius: var(--radius); padding: 18px;
    margin-top: 16px; color: white;
  }
  .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
  .summary-total { font-size: 17px; font-weight: 900; color: var(--gold-light); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; margin-top: 4px; }

  .btn-whatsapp {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    border: none; border-radius: var(--radius);
    color: white; font-family: inherit;
    font-size: 15px; font-weight: 900;
    cursor: pointer; margin-top: 12px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 20px rgba(37,211,102,0.3);
    transition: opacity 0.2s;
  }
  .btn-whatsapp:active { opacity: 0.85; }

  /* ===== ORDER FORM ===== */
  .order-form { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-top: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text-light); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--gray); outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--gold); background: white; }
  textarea.form-input { resize: none; height: 80px; }

  /* ===== ADMIN PAGE ===== */
  .admin-login {
    background: linear-gradient(145deg, var(--dark), var(--dark2));
    border-radius: 20px; padding: 32px 24px;
    text-align: center; margin-top: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }
  .admin-login-icon { font-size: 48px; margin-bottom: 16px; }
  .admin-login-title { color: var(--gold-light); font-size: 20px; font-weight: 900; margin-bottom: 6px; }
  .admin-login-sub { color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 24px; }
  .admin-input {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(200,150,12,0.3); border-radius: 12px;
    color: white; font-family: inherit; font-size: 14px;
    margin-bottom: 12px; outline: none; text-align: right;
    transition: border-color 0.2s;
  }
  .admin-input:focus { border-color: var(--gold); }
  .admin-input::placeholder { color: rgba(255,255,255,0.3); }
  .btn-admin-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; border-radius: 12px;
    color: var(--dark); font-family: inherit;
    font-size: 15px; font-weight: 900; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-admin-login:active { opacity: 0.85; }

  /* Admin Panel */
  .admin-panel { animation: fadeIn 0.3s ease; }
  .admin-card {
    background: white; border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .admin-card-title { font-size: 15px; font-weight: 900; color: var(--dark); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
  .stat-box {
    background: linear-gradient(135deg, var(--dark), var(--dark2));
    border-radius: 14px; padding: 14px 10px; text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 900; color: var(--gold-light); }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  .btn-primary {
    padding: 12px 18px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; border-radius: 12px;
    color: var(--dark); font-family: inherit;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s; width: 100%;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-danger {
    padding: 8px 14px;
    background: #FFF0F0; border: 1.5px solid #FFCCCC;
    color: var(--danger); border-radius: 10px;
    font-family: inherit; font-size: 12px; font-weight: 700;
    cursor: pointer;
  }
  .btn-success {
    padding: 8px 14px;
    background: #F0FFF4; border: 1.5px solid #AAFFCC;
    color: var(--success); border-radius: 10px;
    font-family: inherit; font-size: 12px; font-weight: 700;
    cursor: pointer;
  }

  .order-item {
    background: var(--gray); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .order-id { font-size: 11px; font-weight: 700; color: var(--gold); }
  .order-status {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 6px;
  }
  .status-new { background: #FFF3CD; color: #856404; }
  .status-done { background: #D4EDDA; color: var(--success); }
  .order-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .order-store { font-size: 10px; color: var(--text-light); }
  .order-total { font-size: 14px; font-weight: 900; color: var(--gold); margin-top: 4px; }
  .order-actions { display: flex; gap: 6px; margin-top: 8px; }

  .store-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--gray);
    border-radius: 12px; margin-bottom: 8px;
  }
  .store-item-icon { font-size: 24px; }
  .store-item-info { flex: 1; }
  .store-item-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .store-item-cat { font-size: 10px; color: var(--text-light); }

  .product-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--gray);
    border-radius: 12px; margin-bottom: 8px;
  }
  .product-item-icon { font-size: 24px; }
  .product-item-info { flex: 1; }
  .product-item-name { font-size: 12px; font-weight: 700; color: var(--text); }
  .product-item-price { font-size: 11px; font-weight: 900; color: var(--gold); }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 200; display: none;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 900; color: var(--dark); margin-bottom: 18px; text-align: center; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--dark); color: white;
    padding: 12px 20px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
    z-index: 300; opacity: 0;
    transition: all 0.3s; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 1px solid var(--border);
    display: flex; z-index: 100;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .bottom-nav-btn {
    flex: 1; padding: 10px 4px;
    border: none; background: none;
    cursor: pointer; display: flex;
    flex-direction: column; align-items: center; gap: 3px;
    font-family: inherit; color: var(--text-light);
    font-size: 10px; font-weight: 600;
    transition: color 0.2s; position: relative;
  }
  .bottom-nav-btn .nav-icon { font-size: 20px; }
  .bottom-nav-btn.active { color: var(--gold); }
  .bottom-nav-btn.active .nav-icon { transform: scale(1.1); }

  /* ===== CHIPS ===== */
  .chip-row { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; padding: 7px 14px;
    border-radius: 20px; border: 1.5px solid var(--border);
    background: white; font-family: inherit;
    font-size: 12px; font-weight: 600; color: var(--text-light);
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .chip.active { background: var(--gold-pale); border-color: var(--gold); color: var(--dark); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .text-center { text-align: center; }
  .text-muted { color: var(--text-light); font-size: 12px; }
  .mt-8 { margin-top: 8px; }
  .no-data { text-align: center; padding: 30px; color: var(--text-light); font-size: 13px; }

  /* Emoji selector */
  .emoji-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; margin-bottom: 14px; }
  .emoji-opt {
    aspect-ratio: 1; border-radius: 10px;
    border: 2px solid var(--border); background: var(--gray);
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .emoji-opt.selected { border-color: var(--gold); background: var(--gold-pale); }

  /* Tab switch inside admin */
  .admin-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .admin-tab {
    flex: 1; padding: 9px; border: 1.5px solid var(--border);
    border-radius: 10px; background: var(--gray);
    font-family: inherit; font-size: 12px; font-weight: 700;
    color: var(--text-light); cursor: pointer; text-align: center;
    transition: all 0.2s;
  }
  .admin-tab.active { background: var(--gold-pale); border-color: var(--gold); color: var(--dark); }

  select.form-input { appearance: none; -webkit-appearance: none; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">🏪</div>
  <div class="splash-title">HajiBarzan Company</div>
  <div class="splash-sub">سیستەمی کڕین و فرۆشتن</div>
  <div class="splash-bar"><div class="splash-progress"></div></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="header-logo">
      <div class="logo-icon">🏪</div>
      <div>
        <div class="logo-text">HajiBarzan</div>
        <div class="logo-sub">Company</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="showPage('cart')">
        🛒
        <span class="badge" id="cart-badge" style="display:none">0</span>
      </button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- PAGE: SHOP -->
  <div class="page active" id="page-shop">
    <div class="section-title">دووکانەکان</div>
    <div class="store-grid" id="store-grid"></div>

    <div id="products-section" style="display:none">
      <div class="section-title" id="products-title">کاڵاکان</div>
      <div class="chip-row" id="cat-chips"></div>
      <div class="products-grid" id="products-grid"></div>
    </div>
  </div>

  <!-- PAGE: CART -->
  <div class="page" id="page-cart">
    <div class="section-title">سەبەتەی کڕین</div>
    <div id="cart-list"></div>
    <div id="cart-checkout" style="display:none">
      <div class="cart-summary" id="cart-summary"></div>
      <div class="order-form">
        <div class="section-title" style="font-size:14px;margin-bottom:12px">زانیاری داواکار</div>
        <div class="form-group">
          <label class="form-label">ناو *</label>
          <input type="text" class="form-input" id="buyer-name" placeholder="ناوی تەواو">
        </div>
        <div class="form-group">
          <label class="form-label">ژمارەی مۆبایل *</label>
          <input type="tel" class="form-input" id="buyer-phone" placeholder="07xx xxx xxxx">
        </div>
        <div class="form-group">
          <label class="form-label">ناونیشان</label>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  DATA LAYER — localStorage
// ============================================================
const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem('hbc_'+k)) || null; } catch(e){ return null; } },
  set: (k,v) => localStorage.setItem('hbc_'+k, JSON.stringify(v)),
  def: (k,v) => { if(!DB.get(k)) DB.set(k,v); }
};

// Seed default data
DB.def('admin', { user: 'admin', pass: 'hajibarzan2024' });
DB.def('stores', [
  { id:'s1', name:'سوپەرمارکێتی حاجی', cat:'خواردن و خواردنەوە', icon:'🛍️', wa:'+9647501234567' },
  { id:'s2', name:'دووکانی بازاری', cat:'جلوبەرگ', icon:'👗', wa:'+9647501234568' },
  { id:'s3', name:'دووکانی پەیداکانی ماڵ', cat:'پەیداکانی ماڵ', icon:'🏠', wa:'+9647501234569' },
]);
DB.def('products', [
  { id:'p1', name:'برنج باسماتی', price:15000, unit:'کیلۆ', storeId:'s1', icon:'🌾' },
  { id:'p2', name:'روونی نباتی', price:8500, unit:'لیتر', storeId:'s1', icon:'🫙' },
  { id:'p3', name:'شەکر', price:3500, unit:'کیلۆ', storeId:'s1', icon:'🍬' },
  { id:'p4', name:'ئاو خواردنەوە', price:1500, unit:'باکێژ', storeId:'s1', icon:'💧' },
  { id:'p5', name:'کراسی مێردانە', price:45000, unit:'دانە', storeId:'s2', icon:'👕' },
  { id:'p6', name:'شەمل', price:35000, unit:'دانە', storeId:'s2', icon:'👖' },
  { id:'p7', name:'شووشەی مقاوم', price:12000, unit:'دانە', storeId:'s3', icon:'🧴' },
  { id:'p8', name:'پیسکە', price:5000, unit:'دانە', storeId:'s3', icon:'🧹' },
]);
DB.def('orders', []);
DB.def('cart', []);

// ============================================================
//  STATE
// ============================================================
let currentPage = 'shop';
let selectedStore = null;
let selectedCategory = 'هەموو';
let adminLoggedIn = false;
let selectedStoreEmoji = '🏪';
let selectedProdEmoji = '📦';
let adminSubTab = 'orders';

const STORE_EMOJIS = ['🏪','🛍️','🏬','🏭','🌾','🍎','🥦','🧴','👕','👖','🏠','💊','📦','🎁','🔧','🍕','☕','🥩','🧃','🧈'];
const PROD_EMOJIS = ['📦','🌾','🫙','🍬','💧','🥩','🧃','🧈','🍎','🥦','👕','👖','🔧','💊','🧴','🏠','🎁','🍕','☕','🔑'];

// ============================================================
//  SPLASH
// ============================================================
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => document.getElementById('splash').remove(), 600);
  }, 2000);
  renderShop();
  updateCartBadge();
});

// ============================================================
//  NAVIGATION
// ============================================================
function showPage(p) {
  currentPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p === 'cart') renderCart();
  if(p === 'orders') renderMyOrders();
  if(p === 'admin') renderAdmin();
}

// ============================================================
//  SHOP
// ============================================================
function renderShop() {
  const stores = DB.get('stores') || [];
  const grid = document.getElementById('store-grid');
  if(stores.length === 0) {
    grid.innerHTML = '<p class="no-data" style="grid-column:1/-1">هیچ دووکانێک نییە</p>';
    return;
  }
  grid.innerHTML = stores.map(s => `
    <div class="store-card ${selectedStore===s.id?'selected':''}" onclick="selectStore('${s.id}')">
      <div class="store-icon">${s.icon}</div>
      <div class="store-name">${s.name}</div>
      <div class="store-cat">${s.cat}</div>
    </div>
  `).join('');
  if(selectedStore) renderProducts();
}

function selectStore(id) {
  selectedStore = id;
  selectedCategory = 'هەموو';
  renderShop();
  document.getElementById('products-section').style.display = 'block';
  renderProducts();
  setTimeout(() => document.getElementById('products-section').scrollIntoView({behavior:'smooth', block:'start'}), 100);
}

function renderProducts() {
  const store = (DB.get('stores')||[]).find(s=>s.id===selectedStore);
  if(!store) return;
  document.getElementById('products-title').textContent = 'کاڵاکانی ' + store.name;

  const allProds = (DB.get('products')||[]).filter(p=>p.storeId===selectedStore);
  const cats = ['هەموو', ...new Set(allProds.map(p=>p.unit))];

  // chip row
  const chipRow = document.getElementById('cat-chips');
  chipRow.innerHTML = cats.map(c=>`<button class="chip ${c===selectedCategory?'active':''}" onclick="filterCat('${c}')">${c}</button>`).join('');

  const filtered = selectedCategory==='هەموو' ? allProds : allProds.filter(p=>p.unit===selectedCategory);
  const cart = DB.get('cart') || [];
  const grid = document.getElementById('products-grid');

  if(filtered.length === 0) {
    grid.innerHTML = '<p class="no-data" style="grid-column:1/-1">هیچ کاڵایەک نییە</p>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const ci = cart.findIndex(c=>c.prodId===p.id);
    const qty = ci>=0 ? cart[ci].qty : 0;
    return `
      <div class="product-card">
        <div class="product-img">${p.icon}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-price">${fmt(p.price)} <span class="product-unit">د/${p.unit}</span></div>
          ${qty > 0 ? `
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
            </div>
          ` : `<button class="product-add" onclick="addToCart('${p.id}')">+ زیادکردن</button>`}
        </div>
      </div>`;
  }).join('');
}

function filterCat(c) {
  selectedCategory = c;
  renderProducts();
}

function addToCart(prodId) {
  const cart = DB.get('cart') || [];
  const prod = (DB.get('products')||[]).find(p=>p.id===prodId);
  const store = (DB.get('stores')||[]).find(s=>s.id===prod.storeId);
  cart.push({ prodId, storeId: prod.storeId, storeName: store.name, name: prod.name, price: prod.price, unit: prod.unit, icon: prod.icon, qty: 1 });
  DB.set('cart', cart);
  updateCartBadge();
  showToast('✅ ' + prod.name + ' زیادکرا');
  renderProducts();
}

function changeQty(prodId, delta) {
  let cart = DB.get('cart') || [];
  const idx = cart.findIndex(c=>c.prodId===prodId);
  if(idx<0) return;
  cart[idx].qty += delta;
  if(cart[idx].qty <= 0) cart.splice(idx,1);
  DB.set('cart', cart);
  updateCartBadge();
  renderProducts();
}

// ============================================================
//  CART
// ============================================================
function renderCart() {
  const cart = DB.get('cart') || [];
  const list = document.getElementById('cart-list');
  const checkout = document.getElementById('cart-checkout');

  if(cart.length === 0) {
    list.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div class="cart-empty-text">سەبەتەت بەتاڵە</div><p class="text-muted mt-8">بڕۆ کاڵا هەڵبژێرە!</p></div>`;
    checkout.style.display = 'none';
    return;
  }

  list.innerHTML = cart.map((c,i) => `
    <div class="cart-item">
      <div class="cart-item-icon">${c.icon}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-store">${c.storeName}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${c.prodId}',-1);renderCart()">−</button>
          <span class="qty-num">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty('${c.prodId}',1);renderCart()">+</button>
        </div>
      </div>
      <div>
        <div class="cart-item-price">${fmt(c.price * c.qty)}</div>
        <button class="cart-delete" onclick="removeFromCart(${i})">🗑️</button>
      </div>
    </div>
  `).join('');

  const total = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const totalQty = cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById('cart-summary').innerHTML = `
    <div class="summary-row"><span>کۆی کاڵا</span><span>${totalQty} دانە</span></div>
    <div class="summary-row summary-total"><span>کۆی گشتی</span><span>${fmt(total)} د</span></div>
  `;
  checkout.style.display = 'block';
}

function removeFromCart(i) {
  let cart = DB.get('cart') || [];
  cart.splice(i, 1);
  DB.set('cart', cart);
  updateCartBadge();
  renderCart();
  renderProducts();
}

function updateCartBadge() {
  const cart = DB.get('cart') || [];
  const qty = cart.reduce((s,c)=>s+c.qty,0);
  const badge = document.getElementById('cart-badge');
  badge.style.display = qty > 0 ? 'flex' : 'none';
  badge.textContent = qty > 9 ? '9+' : qty;
}

function sendOrder() {
  const name = document.getElementById('buyer-name').value.trim();
  const phone = document.getElementById('buyer-phone').value.trim();
  const address = document.getElementById('buyer-address').value.trim();
  if(!name || !phone) { showToast('⚠️ ناو و ژمارە پڕبکەرەوە'); return; }

  const cart = DB.get('cart') || [];
  if(cart.length === 0) return;

  const orderId = 'ORD-' + Date.now();
  const total = cart.reduce((s,c)=>s+c.price*c.qty,0);

  // Group by store
  const byStore = {};
  cart.forEach(c => {
    if(!byStore[c.storeId]) byStore[c.storeId] = { storeName: c.storeName, items: [], wa: '' };
    byStore[c.storeId].items.push(c);
  });

  const stores = DB.get('stores') || [];
  stores.forEach(s => { if(byStore[s.id]) byStore[s.id].wa = s.wa; });

  // Save order
  const orders = DB.get('orders') || [];
  orders.unshift({ id: orderId, name, phone, address, cart: [...cart], total, status: 'نوی', date: new Date().toLocaleDateString('ku'), storeGroups: Object.values(byStore).map(b=>b.storeName) });
  DB.set('orders', orders);
  DB.set('cart', []);
  updateCartBadge();

  // Send to each store via WhatsApp
  const storeIds = Object.keys(byStore);
  storeIds.forEach((sId, idx) => {
    const g = byStore[sId];
    let msg = `🏪 *HajiBarzan Company*\n`;
    msg += `📋 داواکاری: ${orderId}\n\n`;
    msg += `👤 کڕیار: ${name}\n📱 ${phone}\n`;
    if(address) msg += `📍 ${address}\n`;
    msg += `\n🛍️ *کاڵاکان:*\n`;
    g.items.forEach(i => msg += `• ${i.icon} ${i.name} × ${i.qty} = ${fmt(i.price*i.qty)} د\n`);
    msg += `\n💰 *کۆی گشتی: ${fmt(total)} دینار*`;

    const wa = g.wa || '+9647500000000';
    const url = `https://wa.me/${wa.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(msg)}`;
    setTimeout(() => window.open(url, '_blank'), idx * 500);
  });

  showToast('✅ داواکاری ناردرا!');
  renderCart();
  setTimeout(() => showPage('orders'), 800);
}

// ============================================================
//  MY ORDERS
// ============================================================
function renderMyOrders() {
  const orders = DB.get('orders') || [];
  const list = document.getElementById('my-orders-list');
  if(orders.length === 0) {
    list.innerHTML = '<div class="no-data">هیچ داواکاریەکت نییە</div>';

  }
  list.innerHTML = orders.map(o => `
    <div class="order-item">

        <div>
          <div class="order-id">${o.id}</div>

      <div style="margin-top:8px;font-size:11px;color:var(--text-light)">
        ${(o.cart||[]).map(c=>`${c.icon} ${c.name} ×${c.qty}`).join(' • ')}

    </div>

// ============================================================
//  ADMIN
// ============================================================
function adminLogin() {
  const u = document.getElementById('admin-user').value.trim();
  const p = document.getElementById('admin-pass').value.trim();
  const cfg = DB.get('admin');
  if(u === cfg.user && p === cfg.pass) {
    adminLoggedIn = true;
    document.getElementById('admin-login-section').style.display = 'none';
    document.getElementById('admin-panel-section').style.display = 'block';
    renderAdminPanel();

    showToast('❌ ناو یان وشەی نهێنی هەڵەیە');

}

  if(!adminLoggedIn) {
    document.getElementById('admin-login-section').style.display = 'block';
    document.getElementById('admin-panel-section').style.display = 'none';
  } else {
    document.getElementById('admin-login-section').style.display = 'none';
    document.getElementById('admin-panel-section').style.display = 'block';
    renderAdminPanel();

}

                </div>

              ${o.address?`<div style="font-size:11px;color:var(--text-light);margin-top:2px">📍 ${o.address}</div>`:''}

          return `

              <div class="product-item-icon">${p.icon}</div>
              <div class="product-item-info">
                <div class="product-item-name">${p.name}</div>
                <div class="product-item-price">${fmt(p.price)} د/${p.unit} · ${store?store.name:''}</div>
              </div>
              <button class="btn-danger" onclick="deleteProduct('${p.id}')">🗑️</button>
            </div>`;
        }).join('')}
      </div>
    </div>

    <button class="btn-danger" style="width:100%;margin-top:8px" onclick="adminLogout()">🚪 چوونەدەرەوە</button>
  `;
}

function switchAdminTab(t) {
  adminSubTab = t;
  renderAdminPanel();
}

function markDone(id) {
  let orders = DB.get('orders') || [];
  const o = orders.find(x=>x.id===id);
  if(o) o.status = 'ئەنجامدرا';
  DB.set('orders', orders);
  renderAdminPanel();
  showToast('✅ داواکاری نیشانکرا');
}

function deleteOrder(id) {
  let orders = DB.get('orders') || [];
  DB.set('orders', orders.filter(o=>o.id!==id));
  renderAdminPanel();
  showToast('🗑️ داواکاری سڕایەوە');
}

function deleteStore(id) {
  let stores = DB.get('stores') || [];
  DB.set('stores', stores.filter(s=>s.id!==id));
  let prods = DB.get('products') || [];
  DB.set('products', prods.filter(p=>p.storeId!==id));
  renderAdminPanel();
  renderShop();
  showToast('🗑️ دووکان سڕایەوە');
}

function deleteProduct(id) {
  let prods = DB.get('products') || [];
  DB.set('products', prods.filter(p=>p.id!==id));
  renderAdminPanel();
  renderProducts();
  showToast('🗑️ کاڵا سڕایەوە');
}

function adminLogout() {
  adminLoggedIn = false;
  document.getElementById('admin-user').value = '';
  document.getElementById('admin-pass').value = '';
  renderAdmin();
  showToast('👋 چوویتە دەرەوە');
}

// ============================================================
//  MODALS
// ============================================================
function openStoreModal() {
  document.getElementById('new-store-name').value = '';
  document.getElementById('new-store-cat').value = '';
  document.getElementById('new-store-wa').value = '';
  selectedStoreEmoji = '🏪';
  const grid = document.getElementById('store-emoji-grid');
  grid.innerHTML = STORE_EMOJIS.map(e=>`<div class="emoji-opt ${e===selectedStoreEmoji?'selected':''}" onclick="selectEmoji('store','${e}')">${e}</div>`).join('');
  document.getElementById('modal-store').classList.add('open');
}

function openProductModal() {
  const stores = DB.get('stores') || [];
  if(stores.length === 0) { showToast('⚠️ پێش زیادکردنی کاڵا، دووکان زیاد بکە'); return; }
  document.getElementById('new-prod-name').value = '';
  document.getElementById('new-prod-price').value = '';
  document.getElementById('new-prod-unit').value = '';
  selectedProdEmoji = '📦';
  const sel = document.getElementById('new-prod-store');
  sel.innerHTML = stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const grid = document.getElementById('prod-emoji-grid');
  grid.innerHTML = PROD_EMOJIS.map(e=>`<div class="emoji-opt ${e===selectedProdEmoji?'selected':''}" onclick="selectEmoji('prod','${e}')">${e}</div>`).join('');
  document.getElementById('modal-product').classList.add('open');
}

function selectEmoji(type, emoji) {
  if(type==='store') {
    selectedStoreEmoji = emoji;
    document.querySelectorAll('#store-emoji-grid .emoji-opt').forEach(el=>el.classList.toggle('selected', el.textContent===emoji));
  } else {
    selectedProdEmoji = emoji;
    document.querySelectorAll('#prod-emoji-grid .emoji-opt').forEach(el=>el.classList.toggle('selected', el.textContent===emoji));
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
});

function saveStore() {
  const name = document.getElementById('new-store-name').value.trim();
  const cat = document.getElementById('new-store-cat').value.trim();
  const wa = document.getElementById('new-store-wa').value.trim();
  if(!name) { showToast('⚠️ ناوی دووکان پڕبکەرەوە'); return; }
  const stores = DB.get('stores') || [];
  stores.push({ id:'s'+Date.now(), name, cat: cat||'گشتی', icon: selectedStoreEmoji, wa: wa||'+9647500000000' });
  DB.set('stores', stores);
  closeModal('modal-store');
  renderShop();
  renderAdminPanel();
  showToast('✅ دووکان زیادکرا');
}

function saveProduct() {
  const name = document.getElementById('new-prod-name').value.trim();
  const price = parseInt(document.getElementById('new-prod-price').value);
  const unit = document.getElementById('new-prod-unit').value.trim();
  const storeId = document.getElementById('new-prod-store').value;
  if(!name || !price) { showToast('⚠️ ناو و نرخ پڕبکەرەوە'); return; }
  const products = DB.get('products') || [];
  products.push({ id:'p'+Date.now(), name, price, unit: unit||'دانە', storeId, icon: selectedProdEmoji });
  DB.set('products', products);
  closeModal('modal-product');
  renderAdminPanel();
  if(selectedStore === storeId) renderProducts();
  showToast('✅ کاڵا زیادکرا');
}

// ============================================================
//  UTILS
// ============================================================
function fmt(n) {
  return Number(n).toLocaleString('en');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
